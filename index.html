</div>
<script>
  // アプリが一定時間内に描画されない場合、原因の切り分けができるようメッセージを出す
  setTimeout(function () {
    var el = document.getElementById('boot-loading');
    if (el) {
      el.innerHTML = '読み込みに時間がかかっています。<br>ページを再読み込みしてください。改善しない場合は通信環境をご確認ください。<br><br><button onclick="location.reload()" style="padding:8px 16px;">再読み込み</button>';
    }
  }, 8000);
</script>
